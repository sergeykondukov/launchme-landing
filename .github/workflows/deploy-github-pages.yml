# Build the static site on GitHub (injects Supabase keys into js/account.bundle.js) and publish to GitHub Pages.
#
# One-time repo setup (you do this in the GitHub website UI):
# 1) Settings → Secrets and variables → Actions → add:
#    - NEXT_PUBLIC_SUPABASE_URL
#    - NEXT_PUBLIC_SUPABASE_ANON_KEY
#    - PADDLE_CLIENT_TOKEN
#    - PADDLE_ENV (sandbox or production)
# 2) Settings → Pages → Build and deployment → Source: "GitHub Actions" (not "Deploy from a branch")

name: Deploy GitHub Pages

on:
  # Run on every push to the default branch so production stays in sync.
  push:
    branches:
      - main
  # Lets you run the workflow manually from the Actions tab (useful after changing secrets).
  workflow_dispatch:

# Opt into Node 24 runtime for GitHub-hosted JavaScript actions ahead of Node 20 removal.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # pnpm is required because this repo uses pnpm-lock.yaml (not npm).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # Install exact versions from the lockfile so CI matches local installs.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Secrets you added in GitHub become env vars only for this step (they are not written into the repo).
      - name: Build static assets (Supabase + Paddle config)
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          PADDLE_CLIENT_TOKEN: ${{ secrets.PADDLE_CLIENT_TOKEN }}
          PADDLE_ENV: ${{ secrets.PADDLE_ENV }}

      # Guardrail: fail deploy early if generated browser files are missing.
      - name: Verify generated bundles exist
        run: |
          test -f js/account.bundle.js
          test -f js/paddle-config.js

      # The Pages artifact must be small; node_modules is huge and not served to visitors.
      - name: Remove node_modules before upload
        run: rm -rf node_modules

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
